<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0a0a0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cadence">
<title>Cadence — Guided Routines</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;600;700;800&family=JetBrains+Mono:wght@300;400;500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0b;
    --bg-raised: #141416;
    --bg-card: #17171a;
    --border: #26262a;
    --border-bright: #3a3a40;
    --text: #f4f4f5;
    --text-dim: #a1a1aa;
    --text-mute: #5b5b63;
    --accent: #d9ff00;
    --accent-dim: #a3c200;
    --radius: 14px;
    --radius-sm: 8px;
    --radius-lg: 22px;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --display: 'Big Shoulders Display', 'Impact', sans-serif;
    --body: 'Manrope', system-ui, -apple-system, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overscroll-behavior: none; }
  body {
    font-family: var(--body);
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(circle at 15% 0%, rgba(217,255,0,0.05), transparent 50%),
      radial-gradient(circle at 85% 100%, rgba(217,255,0,0.035), transparent 55%);
    background-attachment: fixed;
    user-select: none;
    -webkit-user-select: none;
  }

  button { font-family: inherit; background: none; border: none; color: inherit; cursor: pointer; }
  select, input { font-family: inherit; }

  .app {
    max-width: 640px;
    margin: 0 auto;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding-top: env(safe-area-inset-top, 0);
    padding-bottom: env(safe-area-inset-bottom, 0);
  }

  /* ===== Header ===== */
  .brand {
    padding: 20px 22px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-family: var(--display);
    font-weight: 800;
    font-size: 26px;
    letter-spacing: 0.04em;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-dot {
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 2px;
    box-shadow: 0 0 14px rgba(217,255,0,0.65);
    animation: pulseDot 2.5s ease-in-out infinite;
  }
  @keyframes pulseDot { 50% { opacity: 0.5; box-shadow: 0 0 6px rgba(217,255,0,0.3); } }
  .logo span.slash { color: var(--accent); margin: 0 1px; }

  .icon-btn {
    width: 40px; height: 40px;
    border-radius: 11px;
    display: grid;
    place-items: center;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-dim);
    transition: all 0.15s ease;
  }
  .icon-btn:hover { color: var(--text); border-color: var(--border-bright); }
  .icon-btn:active { transform: scale(0.95); }

  /* ===== Screens ===== */
  .screen { flex: 1; display: none; flex-direction: column; padding: 0 22px 24px; }
  .screen.active { display: flex; }

  /* ===== Home ===== */
  .hero { padding: 8px 0 12px; }
  .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.22em;
    color: var(--text-mute);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .hero-title {
    font-family: var(--display);
    font-weight: 600;
    font-size: 44px;
    line-height: 0.95;
    letter-spacing: -0.01em;
  }
  .hero-title em { color: var(--accent); font-style: normal; }

  .section-title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-mute);
    margin: 30px 0 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-title::after {
    content: "";
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--border), transparent);
  }

  .routine-list { display: flex; flex-direction: column; gap: 10px; }

  .routine-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 18px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    transition: all 0.18s cubic-bezier(.2,.8,.2,1);
    text-align: left;
    width: 100%;
    position: relative;
    overflow: hidden;
  }
  .routine-card::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .routine-card:hover { border-color: var(--border-bright); transform: translateY(-1px); }
  .routine-card:hover::before { opacity: 1; }
  .routine-card:active { transform: translateY(0); }
  .routine-card .meta { flex: 1; min-width: 0; }
  .routine-card .name {
    font-family: var(--display);
    font-weight: 600;
    font-size: 22px;
    letter-spacing: 0.005em;
    line-height: 1.05;
  }
  .routine-card .sub {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 4px;
  }
  .routine-card .time {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
    padding: 6px 10px;
    background: rgba(217,255,0,0.06);
    border-radius: 8px;
    border: 1px solid rgba(217,255,0,0.15);
  }

  .footer-note {
    margin-top: 32px;
    padding: 14px 16px;
    font-size: 12px;
    color: var(--text-mute);
    text-align: center;
    line-height: 1.6;
    font-family: var(--mono);
    letter-spacing: 0.02em;
  }
  .footer-note .kbd {
    display: inline-block;
    padding: 2px 6px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 11px;
    color: var(--text-dim);
  }

  /* ===== Workout ===== */
  .workout-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 0 10px;
  }
  .back-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    color: var(--text-dim);
    font-size: 14px;
    padding: 6px 10px 6px 4px;
    margin-left: -4px;
    border-radius: 8px;
    transition: color 0.15s;
  }
  .back-btn:hover { color: var(--text); }
  .step-counter {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.12em;
  }
  .step-counter .now { color: var(--accent); }

  .progress-track {
    height: 3px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin: 6px 0 28px;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.4s cubic-bezier(.2,.8,.2,1);
    box-shadow: 0 0 10px rgba(217,255,0,0.5);
  }

  .exercise-block { min-height: 168px; }
  .exercise-name {
    font-family: var(--display);
    font-weight: 700;
    font-size: 54px;
    line-height: 0.98;
    letter-spacing: -0.005em;
    margin-bottom: 14px;
  }
  .side-tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    padding: 4px 10px;
    background: rgba(217,255,0,0.1);
    color: var(--accent);
    border: 1px solid rgba(217,255,0,0.25);
    border-radius: 6px;
    letter-spacing: 0.14em;
    margin-bottom: 16px;
  }
  .rest-tag {
    background: rgba(161,161,170,0.1);
    color: var(--text-dim);
    border-color: rgba(161,161,170,0.2);
  }
  .prep-tag {
    background: rgba(217,255,0,0.14);
    color: var(--accent);
    border-color: rgba(217,255,0,0.35);
    font-weight: 600;
    animation: prepTagPulse 1.5s ease-in-out infinite;
  }
  @keyframes prepTagPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  .exercise-cue {
    color: var(--text-dim);
    font-size: 15px;
    line-height: 1.55;
    max-width: 42ch;
    margin-bottom: 20px;
  }

  .timer-ring-wrap {
    display: flex;
    justify-content: center;
    margin: 8px 0 24px;
  }
  .timer-ring {
    width: 248px;
    height: 248px;
    position: relative;
  }
  .timer-ring svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }
  .timer-ring .bg-circle {
    fill: none;
    stroke: var(--border);
    stroke-width: 3;
  }
  .timer-ring .fg-circle {
    fill: none;
    stroke: var(--accent);
    stroke-width: 3.5;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.95s linear;
    filter: drop-shadow(0 0 8px rgba(217,255,0,0.35));
  }
  .rest-mode .fg-circle { stroke: var(--text-dim); filter: none; }
  .prep-mode .fg-circle {
    stroke: var(--accent);
    opacity: 0.55;
    filter: drop-shadow(0 0 6px rgba(217,255,0,0.22));
    animation: prepRingPulse 1.8s ease-in-out infinite;
  }
  @keyframes prepRingPulse {
    0%, 100% { opacity: 0.55; }
    50% { opacity: 0.9; }
  }
  .timer-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .timer-seconds {
    font-family: var(--mono);
    font-weight: 300;
    font-size: 86px;
    letter-spacing: -0.05em;
    color: var(--text);
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .timer-seconds.warn { color: var(--accent); text-shadow: 0 0 24px rgba(217,255,0,0.3); }
  .timer-hint {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-mute);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-top: 8px;
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 22px;
    padding: 8px 0 4px;
  }
  .ctrl {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    display: grid;
    place-items: center;
    transition: all 0.15s ease;
    color: var(--text);
  }
  .ctrl:hover { border-color: var(--border-bright); background: var(--bg-raised); }
  .ctrl:active { transform: scale(0.93); }
  .ctrl.primary {
    width: 82px; height: 82px;
    background: var(--accent);
    border-color: var(--accent);
    color: #0a0a0b;
    box-shadow: 0 0 28px rgba(217,255,0,0.28);
  }
  .ctrl.primary:hover { filter: brightness(1.06); }

  .next-up {
    margin-top: 28px;
    padding: 13px 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .next-up-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--text-mute);
    text-transform: uppercase;
  }
  .next-up-name {
    font-family: var(--display);
    font-weight: 600;
    font-size: 17px;
    color: var(--text);
    margin-top: 2px;
    line-height: 1.1;
  }
  .next-up-time {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }

  /* Paused state */
  .paused .timer-seconds { color: var(--text-dim); animation: pulseFade 1.8s ease-in-out infinite; }
  .paused .fg-circle { stroke: var(--text-dim); filter: none; }
  @keyframes pulseFade { 50% { opacity: 0.4; } }

  /* ===== Complete ===== */
  .complete {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 20px;
  }
  .complete-check {
    width: 96px; height: 96px;
    border-radius: 50%;
    background: rgba(217,255,0,0.1);
    border: 1px solid var(--accent);
    display: grid;
    place-items: center;
    margin-bottom: 28px;
    box-shadow: 0 0 50px rgba(217,255,0,0.18);
    animation: bloom 0.6s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes bloom { from { transform: scale(0.6); opacity: 0; } }
  .complete-title {
    font-family: var(--display);
    font-size: 56px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
  }
  .complete-sub {
    color: var(--text-dim);
    margin-bottom: 36px;
    font-size: 15px;
  }
  .complete-stats {
    display: flex;
    gap: 44px;
    margin-bottom: 44px;
  }
  .complete-stat { text-align: center; }
  .complete-stat .v {
    font-family: var(--mono);
    font-size: 30px;
    font-weight: 500;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .complete-stat .l {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-mute);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-top: 10px;
  }

  .btn {
    padding: 15px 28px;
    border-radius: 12px;
    font-family: var(--mono);
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    transition: all 0.15s ease;
    border: 1px solid transparent;
    cursor: pointer;
  }
  .btn-primary {
    background: var(--accent);
    color: #0a0a0b;
  }
  .btn-primary:hover { filter: brightness(1.08); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    border-color: var(--border);
  }
  .btn-ghost:hover { border-color: var(--border-bright); color: var(--text); }

  /* ===== Settings modal ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 100;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } }
  .modal-overlay.active { display: flex; }
  .modal {
    width: 100%;
    max-width: 640px;
    background: var(--bg-raised);
    border-top-left-radius: var(--radius-lg);
    border-top-right-radius: var(--radius-lg);
    padding: 22px 22px calc(28px + env(safe-area-inset-bottom, 0));
    border-top: 1px solid var(--border);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    animation: slideUp 0.25s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes slideUp { from { transform: translateY(30%); opacity: 0; } }
  .modal-title {
    font-family: var(--display);
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 16px;
  }
  .setting {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .setting:last-child { border-bottom: none; }
  .setting label { color: var(--text-dim); font-size: 14px; flex: 1; }
  .setting select, .setting input[type=range] {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    border-radius: 8px;
    font-family: var(--body);
    font-size: 13px;
    max-width: 210px;
  }
  .setting input[type=range] { max-width: 140px; accent-color: var(--accent); }
  .toggle {
    width: 46px; height: 26px;
    background: var(--border);
    border-radius: 999px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle.on { background: var(--accent); }
  .toggle::after {
    content: "";
    position: absolute;
    top: 3px; left: 3px;
    width: 20px; height: 20px;
    background: var(--text);
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle.on::after { transform: translateX(20px); background: #0a0a0b; }

  /* ===== Transitions ===== */
  .fade-enter { animation: fadeUp 0.35s cubic-bezier(.2,.8,.2,1); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } }

  /* ===== Mobile ===== */
  @media (max-width: 440px) {
    .brand { padding: 18px 18px 8px; }
    .screen { padding: 0 18px 22px; }
    .hero-title { font-size: 36px; }
    .exercise-name { font-size: 44px; }
    .exercise-block { min-height: 150px; }
    .timer-ring { width: 220px; height: 220px; }
    .timer-seconds { font-size: 74px; }
    .ctrl { width: 52px; height: 52px; }
    .ctrl.primary { width: 74px; height: 74px; }
    .complete-title { font-size: 46px; }
    .complete-stats { gap: 32px; }
  }
  @media (max-height: 700px) {
    .exercise-block { min-height: 120px; }
    .exercise-name { font-size: 42px; }
    .timer-ring { width: 200px; height: 200px; }
    .timer-seconds { font-size: 66px; }
    .next-up { margin-top: 18px; }
  }
</style>
</head>
<body>
<div class="app">

  <header class="brand">
    <div class="logo">
      <span class="logo-dot"></span>
      CA<span class="slash">/</span>DENCE
    </div>
    <button class="icon-btn" id="settingsBtn" aria-label="Settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <!-- HOME -->
  <section class="screen active" id="homeScreen">
    <div class="hero">
      <div class="eyebrow">Your routines</div>
      <h1 class="hero-title">Move with <em>intention.</em></h1>
    </div>

    <div class="section-title">Warm up &amp; recover</div>
    <div class="routine-list" id="warmList"></div>

    <div class="section-title">Strength &amp; stability</div>
    <div class="routine-list" id="strengthList"></div>

    <div class="footer-note">
      Plug in earphones, hit play, put the phone down.<br>
      <span class="kbd">space</span> pause · <span class="kbd">←</span><span class="kbd">→</span> skip
    </div>
  </section>

  <!-- WORKOUT -->
  <section class="screen" id="workoutScreen">
    <div class="workout-top">
      <button class="back-btn" id="quitBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
        Exit
      </button>
      <div class="step-counter"><span class="now" id="stepNow">1</span> <span>/ <span id="stepTotal">—</span></span></div>
    </div>

    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

    <div class="eyebrow" id="routineLabel">Routine</div>
    <div class="exercise-block">
      <div class="exercise-name" id="exerciseName">—</div>
      <div id="sideWrap" style="display:none"><span class="side-tag" id="exerciseSide"></span></div>
      <div class="exercise-cue" id="exerciseCue"></div>
    </div>

    <div class="timer-ring-wrap">
      <div class="timer-ring" id="timerRing">
        <svg viewBox="0 0 100 100">
          <circle class="bg-circle" cx="50" cy="50" r="46"/>
          <circle class="fg-circle" id="progressCircle" cx="50" cy="50" r="46" stroke-dasharray="289.03" stroke-dashoffset="0"/>
        </svg>
        <div class="timer-text">
          <div class="timer-seconds" id="timerSeconds">0</div>
          <div class="timer-hint" id="timerHint">SECONDS</div>
        </div>

/* =======================================================================
   STATE
   ======================================================================= */
const state = {
  currentRoutine: null,
  currentKey: null,
  idx: 0,
  phase: "idle",              // "idle" | "intro" | "transition" | "active"
  running: false,
  secondsLeft: 0,
  totalSecondsTarget: 0,
  tickId: null,
  totalElapsed: 0,
  completedExercises: 0,
  wakeLock: null,
  voices: [],
  selectedVoice: null,
  voiceRate: 1.0,
  countdown: true,
  beep: true,
  keepAwake: true,
  audioCtx: null,
  lastSpokenSecond: null,
  hasPreAnnounced: false,
  introDuration: 8,
  transitionDuration: 10,
  preAnnounceAt: 5,           // seconds before end
  preAnnounceEnabled: true
};

const $ = s => document.querySelector(s);
const fmt = s => {
  const m = Math.floor(s/60);
  const sec = s % 60;
  return m + ":" + String(sec).padStart(2, "0");
};

function show(id) {
  ["homeScreen","workoutScreen","completeScreen"].forEach(s => $("#"+s).classList.remove("active"));
  $("#"+id).classList.add("active");
}

/* =======================================================================
   SPEECH
   ======================================================================= */
function loadVoices() {
  state.voices = speechSynthesis.getVoices();
  const sel = $("#voiceSelect");
  const prev = sel.value;
  sel.innerHTML = "";
  const english = state.voices.filter(v => v.lang && v.lang.toLowerCase().startsWith("en"));
  const list = english.length ? english : state.voices;
  list.forEach(v => {
    const opt = document.createElement("option");
    opt.value = v.name;
    opt.textContent = v.name + " · " + v.lang;
    sel.appendChild(opt);
  });
  // Prefer a natural-sounding default
  const preferred = list.find(v => /Samantha|Google US English|Google UK English Female|Aria|Natural|Neural|Jenny|Guy/i.test(v.name))
    || list.find(v => v.lang === "en-US")
    || list[0];
  if (prev && list.find(v => v.name === prev)) {
    sel.value = prev;
    state.selectedVoice = list.find(v => v.name === prev);
  } else if (preferred) {
    state.selectedVoice = preferred;
    sel.value = preferred.name;
  }
}

function speak(text, opts = {}) {
  if (!("speechSynthesis" in window)) return;
  if (opts.priority) speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  if (state.selectedVoice) u.voice = state.selectedVoice;
  u.rate = state.voiceRate;
  u.pitch = 1.0;
  u.volume = 1.0;
  speechSynthesis.speak(u);
}

/* =======================================================================
   BEEP (Web Audio)
   ======================================================================= */
function ensureAudio() {
  if (!state.audioCtx) {
    try { state.audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { return; }
  }
  if (state.audioCtx.state === "suspended") state.audioCtx.resume();
}
function beep(freq = 720, duration = 120) {
  if (!state.beep || !state.audioCtx) return;
  try {
    const ctx = state.audioCtx;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "sine";
    osc.frequency.value = freq;
    gain.gain.value = 0.0001;
    osc.connect(gain).connect(ctx.destination);
    const now = ctx.currentTime;
    gain.gain.exponentialRampToValueAtTime(0.18, now + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + duration/1000);
    osc.start(now);
    osc.stop(now + duration/1000 + 0.02);
  } catch(e){}
}

/* =======================================================================
   WAKE LOCK
   ======================================================================= */
async function acquireWakeLock() {
  if (!state.keepAwake) return;
  if (!("wakeLock" in navigator)) return;
  try {
    state.wakeLock = await navigator.wakeLock.request("screen");
    state.wakeLock.addEventListener("release", () => { state.wakeLock = null; });
  } catch(e){}
}
async function releaseWakeLock() {
  if (state.wakeLock) {
    try { await state.wakeLock.release(); } catch(e){}
    state.wakeLock = null;
  }
}

/* =======================================================================
   HOME
   ======================================================================= */
function renderHome() {
  const warm = $("#warmList");
  const strength = $("#strengthList");
  warm.innerHTML = "";
  strength.innerHTML = "";

  Object.entries(ROUTINES).forEach(([key, r]) => {
    const totalSec = r.exercises.reduce((s,e) => s + e.seconds, 0);
    const mins = Math.max(1, Math.round(totalSec / 60));
    const count = r.exercises.filter(e => !e.rest).length;

    const btn = document.createElement("button");
    btn.className = "routine-card";
    btn.innerHTML = `
      <div class="meta">
        <div class="name">${r.name}</div>
        <div class="sub">${r.tagline} · ${count} exercises</div>
      </div>
      <div class="time">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        ${mins} min
      </div>
    `;
    btn.onclick = () => startRoutine(key);
    (r.category === "strength" ? strength : warm).appendChild(btn);

}

/* =======================================================================
   WORKOUT
   ======================================================================= */
function describeExercise(e) {
  let s = e.name;
  if (e.side === "R") s += ", right side";
  else if (e.side === "L") s += ", left side";
  return s;
}

function startRoutine(key) {
  state.currentRoutine = ROUTINES[key];
  state.currentKey = key;
  state.idx = 0;
  state.running = false;
  state.totalElapsed = 0;
  state.completedExercises = 0;

  // Prime audio contexts (must happen in user-gesture handler)
  ensureAudio();

  show("workoutScreen");
  $("#stepTotal").textContent = state.currentRoutine.exercises.length;

  // If transitions are disabled, start directly at first exercise with an intro-like announcement
  if (state.transitionDuration === 0) {
    enterPhase("active", 0, { firstExercise: true });
  } else {
    enterPhase("intro", 0);
  }

  togglePlay(true);
  acquireWakeLock();
}

// ---------- Phase management ----------
function enterPhase(phase, idx, opts = {}) {
  state.phase = phase;
  state.idx = idx;
  state.hasPreAnnounced = false;
  state.lastSpokenSecond = null;

  const ex = state.currentRoutine.exercises[idx];
  let duration;

  if (phase === "intro") {
    duration = state.introDuration;
  } else if (phase === "transition") {
    duration = state.transitionDuration;
  } else {
    // active
    duration = ex.seconds;
  }

  state.secondsLeft = duration;
  state.totalSecondsTarget = duration;

  renderPhase(phase, idx);
  speakPhaseStart(phase, idx, opts);
}

function speakPhaseStart(phase, idx, opts = {}) {
  const ex = state.currentRoutine.exercises[idx];

  if (phase === "intro") {
    const cue = ex.cue ? " " + ex.cue : "";
    speak("Starting " + state.currentRoutine.name + ". First up, " + describeExercise(ex) + "." + cue + " Get ready.", { priority: true });
  }
  else if (phase === "transition") {
    const cue = ex.cue ? " " + ex.cue : "";
    speak("Next up, " + describeExercise(ex) + "." + cue, { priority: true });
  }
  else if (phase === "active") {
    if (ex.rest) {
      speak("Rest. " + ex.seconds + " seconds.", { priority: true });
    } else if (opts.firstExercise) {
      // Transitions are disabled — give an abbreviated intro
      const cue = ex.cue ? " " + ex.cue : "";
      speak("Starting " + state.currentRoutine.name + ". " + describeExercise(ex) + "." + cue, { priority: true });
    } else if (opts.afterRest) {
      // Announce the transition from rest to the new exercise
      speak("Begin. " + describeExercise(ex) + ".", { priority: true });
    }
    // Otherwise: no speech (transition phase already announced it)
  }
}

function renderPhase(phase, idx) {
  const ex = state.currentRoutine.exercises[idx];

  $("#routineLabel").textContent = state.currentRoutine.name;

  const nameEl = $("#exerciseName");
  nameEl.textContent = ex.name;
  nameEl.classList.remove("fade-enter");
  void nameEl.offsetWidth;
  nameEl.classList.add("fade-enter");

  const sideWrap = $("#sideWrap");
  const sideEl = $("#exerciseSide");
  sideEl.classList.remove("rest-tag", "prep-tag");

  if (phase === "intro" || phase === "transition") {
    sideWrap.style.display = "";
    // Include side info if the upcoming exercise has one
    const sideStr = ex.side === "R" ? " · RIGHT" : ex.side === "L" ? " · LEFT" : "";
    sideEl.textContent = "GET READY" + sideStr;
    sideEl.classList.add("prep-tag");
  } else if (ex.side) {
    sideWrap.style.display = "";
    sideEl.textContent = ex.side === "R" ? "RIGHT SIDE" : "LEFT SIDE";
  } else if (ex.rest) {
    sideWrap.style.display = "";
    sideEl.textContent = "REST";
    sideEl.classList.add("rest-tag");
  } else {
    sideWrap.style.display = "none";
  }

  $("#exerciseCue").textContent = ex.cue || "";
  $("#stepNow").textContent = idx + 1;

  // Timer ring mode
  const ring = $("#timerRing");
  ring.classList.remove("rest-mode", "prep-mode");
  if (phase === "intro" || phase === "transition") {
    ring.classList.add("prep-mode");
  } else if (ex.rest) {
    ring.classList.add("rest-mode");
  }

  updateTimerDisplay();
  updateNextUp();
  updateProgressBar();
}

function updateTimerDisplay() {
  const ex = state.currentRoutine.exercises[state.idx];
  const secEl = $("#timerSeconds");
  secEl.textContent = state.secondsLeft;

  // Warn color on active non-rest exercises, 3-2-1
  const showWarn = state.phase === "active" && ex && !ex.rest && state.secondsLeft <= 3 && state.secondsLeft > 0;
  secEl.classList.toggle("warn", showWarn);

  let label;
  if (state.phase === "intro" || state.phase === "transition") label = "GET READY";
  else if (ex && ex.rest) label = "REST";
  else label = "SECONDS";
  $("#timerHint").textContent = label;

  const C = 2 * Math.PI * 46;
  const pct = state.totalSecondsTarget > 0 ? state.secondsLeft / state.totalSecondsTarget : 0;
  $("#progressCircle").style.strokeDashoffset = (C * (1 - pct)).toFixed(2);
}

function updateNextUp() {
  // During intro/transition, "up next" means what follows the upcoming exercise.
  // During active, "up next" is the next item.
  const nextIdx = state.idx + 1;
  const next = state.currentRoutine.exercises[nextIdx];
  if (!next) {
    $("#nextUpName").textContent = "Finish";
    $("#nextUpTime").textContent = "—";
  } else {
    $("#nextUpName").textContent = next.rest ? "Rest" : describeExercise(next);
    $("#nextUpTime").textContent = next.seconds + "s";
  }
}

function updateProgressBar() {
  // Only exercise/rest time counts toward progress. Intro and transition don't inflate the bar.
  const total = state.currentRoutine.exercises.reduce((s, e) => s + e.seconds, 0);
  const completedBefore = state.currentRoutine.exercises.slice(0, state.idx).reduce((s, e) => s + e.seconds, 0);
  let withinCurrent = 0;
  if (state.phase === "active") withinCurrent = state.totalSecondsTarget - state.secondsLeft;
  const pct = total > 0 ? ((completedBefore + withinCurrent) / total) * 100 : 0;
  $("#progressFill").style.width = pct + "%";
}

// ---------- Tick loop ----------
function tick() {
  if (!state.running) return;
  state.secondsLeft--;

  // Only count active time toward total elapsed
  if (state.phase === "active") state.totalElapsed++;

  handleInPhaseSpeech();

  if (state.secondsLeft <= 0) {
    advance();
    return;
  }

  updateTimerDisplay();
  updateProgressBar();
}

function handleInPhaseSpeech() {
  const ex = state.currentRoutine.exercises[state.idx];

  // Pre-announcement during active phase — "Next: X" heads-up
  if (state.preAnnounceEnabled && state.phase === "active" && !state.hasPreAnnounced) {
    if (state.secondsLeft === state.preAnnounceAt) {
      state.hasPreAnnounced = true;
      const nextIdx = state.idx + 1;
      const next = state.currentRoutine.exercises[nextIdx];
      if (next) {
        if (ex.rest) {
          // During rest, give a fuller heads-up since there's no transition phase after
          const cue = next.cue ? " " + next.cue : "";
          speak("Up next: " + describeExercise(next) + "." + cue);
        } else if (!next.rest) {
          // Active → active. Keep it short; the transition phase will deliver the cue.
          speak("Next: " + describeExercise(next));
        }
        // If current is active non-rest and next is rest, skip — rest is its own break.
      }
    }
  }

  // Spoken countdown, 3-2-1 on active exercises only
  if (state.countdown && state.phase === "active" && !ex.rest) {
    if (state.secondsLeft <= 3 && state.secondsLeft >= 1 && state.lastSpokenSecond !== state.secondsLeft) {
      speak(String(state.secondsLeft));
      state.lastSpokenSecond = state.secondsLeft;
    }
  }
}

function advance() {
  beep(740, 140);

  if (state.phase === "intro") {
    enterPhase("active", 0);
    return;
  }

  if (state.phase === "transition") {
    enterPhase("active", state.idx);
    return;
  }

  // phase === "active"
  const currentEx = state.currentRoutine.exercises[state.idx];
  if (!currentEx.rest) state.completedExercises++;

  const nextIdx = state.idx + 1;
  if (nextIdx >= state.currentRoutine.exercises.length) {
    finish();
    return;
  }
  const next = state.currentRoutine.exercises[nextIdx];

  // Decide: rest → active, active → rest, or active → transition → active?
  if (next.rest) {
    enterPhase("active", nextIdx);
  } else if (currentEx.rest) {
    // Rest already served as the transition. Go directly to the new exercise with a brief announcement.
    enterPhase("active", nextIdx, { afterRest: true });
  } else if (state.transitionDuration > 0) {
    enterPhase("transition", nextIdx);
  } else {
    // Transitions disabled — go straight to next exercise with an announcement
    enterPhase("active", nextIdx, { afterRest: true });
  }
}

function togglePlay(force) {
  const willRun = typeof force === "boolean" ? force : !state.running;
  state.running = willRun;
  $("#playIcon").innerHTML = willRun
    ? '<path d="M6 5h4v14H6zm8 0h4v14h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';
  $("#workoutScreen").classList.toggle("paused", !willRun);

  if (willRun) {
    if (!state.tickId) state.tickId = setInterval(tick, 1000);
    acquireWakeLock();
  } else {
    clearInterval(state.tickId);
    state.tickId = null;
    speechSynthesis.cancel();
  }
}

function skipNext() {
  beep(900, 80);

  if (state.phase === "intro") {
    enterPhase("active", 0, { firstExercise: true });
    return;
  }
  if (state.phase === "transition") {
    // Finish the transition early — start the exercise it was preparing for
    enterPhase("active", state.idx, { afterRest: true });
    return;
  }

  // phase === "active" — skip forward to the NEXT actual exercise (no transition)
  const currentEx = state.currentRoutine.exercises[state.idx];
  if (!currentEx.rest) state.completedExercises++;
  const nextIdx = state.idx + 1;
  if (nextIdx >= state.currentRoutine.exercises.length) {
    finish();
    return;
  }
  enterPhase("active", nextIdx, { afterRest: true });
}

function skipPrev() {
  // If well into an active phase, restart it instead of moving back
  if (state.phase === "active" && state.totalSecondsTarget - state.secondsLeft > 3) {
    state.secondsLeft = state.totalSecondsTarget;
    state.hasPreAnnounced = false;
    state.lastSpokenSecond = null;
    updateTimerDisplay();
    return;
  }

  beep(600, 80);

  if (state.phase === "intro") {
    // Restart intro
    enterPhase("intro", 0);
    return;
  }
  if (state.phase === "transition") {
    // Go back to the previous active exercise (or intro if idx === 0)
    if (state.idx === 0) enterPhase("intro", 0);
    else enterPhase("active", state.idx - 1, { afterRest: true });
    return;
  }

  // phase === "active"
  if (state.idx === 0) {
    // Back to intro (or restart if transitions disabled)
    if (state.transitionDuration === 0) {
      enterPhase("active", 0, { firstExercise: true });
    } else {
      enterPhase("intro", 0);
    }
    return;
  }
  enterPhase("active", state.idx - 1, { afterRest: true });
}

function finish() {
  state.running = false;
  clearInterval(state.tickId);
  state.tickId = null;
  state.phase = "idle";
  speechSynthesis.cancel();
  beep(880, 200);
  setTimeout(() => beep(1100, 240), 160);
  setTimeout(() => speak("Routine complete. Nice work.", { priority: true }), 400);
  $("#statTime").textContent = fmt(state.totalElapsed);
  $("#statExercises").textContent = state.completedExercises;
  $("#completeSub").textContent = state.currentRoutine.name + " complete.";
  show("completeScreen");
  releaseWakeLock();
}

function quitWorkout() {
  if (state.totalElapsed > 5 && !confirm("Exit this routine?")) return;
  state.running = false;
  state.phase = "idle";
  clearInterval(state.tickId);
  state.tickId = null;
  speechSynthesis.cancel();
  releaseWakeLock();
  show("homeScreen");
}

/* =======================================================================
   SETTINGS
   ======================================================================= */
function bindToggle(id, key) {
  const el = $("#" + id);
  el.addEventListener("click", () => {
    el.classList.toggle("on");
    state[key] = el.classList.contains("on");
    if (key === "keepAwake") {
      if (state.keepAwake && state.running) acquireWakeLock();
      else releaseWakeLock();
    }
  });
}

/* =======================================================================
   INIT
   ======================================================================= */
document.addEventListener("DOMContentLoaded", () => {
  renderHome();

  if ("speechSynthesis" in window) {
    loadVoices();
    speechSynthesis.addEventListener("voiceschanged", loadVoices);
  }
  $("#voiceSelect").addEventListener("change", e => {
    state.selectedVoice = state.voices.find(v => v.name === e.target.value);
  });
  $("#voiceRate").addEventListener("input", e => { state.voiceRate = parseFloat(e.target.value); });
  $("#transitionSelect").addEventListener("change", e => {
    state.transitionDuration = parseInt(e.target.value, 10);
  });

  $("#playBtn").addEventListener("click", () => togglePlay());
  $("#nextBtn").addEventListener("click", skipNext);
  $("#prevBtn").addEventListener("click", skipPrev);
  $("#quitBtn").addEventListener("click", quitWorkout);
  $("#doneBtn").addEventListener("click", () => show("homeScreen"));

  $("#settingsBtn").addEventListener("click", () => $("#settingsModal").classList.add("active"));
  $("#closeSettings").addEventListener("click", () => $("#settingsModal").classList.remove("active"));
  $("#settingsModal").addEventListener("click", e => {
    if (e.target === $("#settingsModal")) $("#settingsModal").classList.remove("active");
  });

  bindToggle("countdownToggle", "countdown");
  bindToggle("beepToggle", "beep");
  bindToggle("wakeToggle", "keepAwake");
  bindToggle("preAnnounceToggle", "preAnnounceEnabled");

  document.addEventListener("keydown", e => {
    if (!$("#workoutScreen").classList.contains("active")) return;
    if (e.code === "Space") { e.preventDefault(); togglePlay(); }
    else if (e.code === "ArrowRight") { e.preventDefault(); skipNext(); }
    else if (e.code === "ArrowLeft") { e.preventDefault(); skipPrev(); }
  });

  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible" && state.running && state.keepAwake) acquireWakeLock();
  });
});
</script>
</body>
</html>
